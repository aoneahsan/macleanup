name: 🐛 Bug report
description: A reproducible problem with mac-cleanup.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in every field — vague reports get closed.

        **Security issues** should NOT be filed here. Email <aoneahsan@gmail.com> instead. See [SECURITY.md](https://github.com/aoneahsan/macleanup/blob/main/SECURITY.md).

  - type: input
    id: version
    attributes:
      label: mac-cleanup version
      description: Output of `mac-cleanup --version` (or `npx macleanup --version`).
      placeholder: "mac-cleanup 4.3.0"
    validations:
      required: true

  - type: input
    id: macos
    attributes:
      label: macOS version
      description: Apple menu → About this Mac. Include chip (Apple Silicon vs Intel).
      placeholder: "macOS 14.5 — Apple M2 Pro"
    validations:
      required: true

  - type: input
    id: bash
    attributes:
      label: bash version
      description: Output of `bash --version | head -1`.
      placeholder: "GNU bash, version 3.2.57(1)-release"
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: How was mac-cleanup installed?
      options:
        - npx (zero-install)
        - npm install -g
        - direct git checkout
        - other (describe in steps)
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Exact command you ran
      description: Paste the full command including all flags. Use a code block.
      placeholder: |
        mac-cleanup --only 23 --stale-build-days 30 --dry-run
      render: bash
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
      description: Include stderr / output. Redact any personal paths if you prefer.
    validations:
      required: true

  - type: textarea
    id: log
    attributes:
      label: Relevant log excerpt
      description: |
        From `~/.mac-cleanup/logs/mac-cleanup-YYYY-MM-DD.log`.
        Just the lines around the failure — not the whole file.
      render: text

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirm
      options:
        - label: I have searched existing issues for duplicates.
          required: true
        - label: I have re-run with `--dry-run` to confirm the bug isn't a misunderstanding of what the section deletes.
          required: true
